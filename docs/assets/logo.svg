<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- IsiOne Logo - Traffic light with checkmark -->

  <!-- Rounded rectangle border -->
  <rect x="16" y="4" width="32" height="56" rx="6" ry="6" fill="none" stroke="#646cff" stroke-width="2.5"/>

  <!-- Top circle - red -->
  <circle cx="32" cy="14" r="6" fill="#f87171" stroke="#f87171" stroke-width="2"/>

  <!-- Middle circle - yellow/amber -->
